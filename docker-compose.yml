version: "3.8"

services:

  # FastAPI Backend
  app:
    build: .
    container_name: agent_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: agent_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQLPASSWORD}
      MYSQL_DATABASE: reminder_tool
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Price Checker Scheduler
  scheduler:
    build: .
    container_name: agent_scheduler
    command: ["python", "-m", "reminder_tool.price_checker"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  mysql_data: